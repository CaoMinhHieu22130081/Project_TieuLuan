# Server
server.port=8080
server.servlet.context-path=/api

# MySQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/uniquetee?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Logging
logging.level.root=INFO
logging.level.com.uniquetee=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# App
spring.application.name=UniqueTee Backend

# JWT Configuration
jwt.secret=mySecretKeyForSigningJWTTokensForUniqueTeeApplicationPleaseChangeInProduction
jwt.expiration=86400000